<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Scale Model Color Manager</title>
    <script>
      tailwind = window.tailwind || {};
      tailwind.config = tailwind.config || {};
      tailwind.config.darkMode = 'media';
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-sky-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100">
    <div class="max-w-full mx-auto p-6">
      <header class="mb-6">
        <h1 class="text-2xl font-semibold">Scale Model Color Manager</h1>
        

      <section class="mb-4">
        <label class="block text-sm font-medium mb-2">Brands</label>
        <div id="brandTabs" class="flex gap-2 flex-wrap"></div>
      </section>

      <section>
        <div id="list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2 shadow-sm "></div>

        <template id="colorRowTemplate">
          <div class="bg-white dark:bg-gray-800 p-0  rounded-xl shadow-sm flex justify-between text-xl overflow-hidden">
            <div data-swatch class="w-12   shadow-sm flex-shrink-0 "></div>
            <div class="flex items-center gap-2 flex-1 p-2">
              <div class="flex-1 min-w-0">
                <div data-code class="font-semibold text-xl truncate mb-0">CODE</div>
                <div data-name class="font-semibold text-xs truncate mb-2">NAME</div>
                <div data-type class="text-xs text-gray-500 dark:text-gray-400 "></div>
                <div data-equivalents class="hidden text-xs text-gray-500 dark:text-gray-400"></div>
                <div data-secondary-equivalents class="hidden text-xs text-gray-500 dark:text-gray-400"></div>
              </div>
              <button data-btn class="px-2 py-0.5 rounded border text-xs whitespace-nowrap">Stack</button>
            </div>
            
          </div>
        </template>
      </section>
    </div>

    <script type="module" src="/script.js"></script>
  </body>
</html>
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scale Model Color Manager</title>
  </head>
  <body>
    <div id="root"></div>

  </body>
</html>
