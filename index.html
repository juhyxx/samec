<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Scale Model Color Manager</title>
    <script>
      tailwind = window.tailwind || {};
      tailwind.config = tailwind.config || {};
      tailwind.config.darkMode = 'media';
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-sky-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100">
    <div class="max-w-full mx-auto p-4 flex gap-4 items-start">

      <!-- ── Main color browser ── -->
      <div class="flex-1 min-w-0">
        <header class="mb-4">
          <h1 class="text-2xl font-semibold">Scale Model Color Manager</h1>
        </header>

        <section class="mb-4">
          <div class="flex flex-wrap items-end gap-4">
            <div>
              <label class="block text-sm font-medium mb-2">Brands</label>
              <div id="brandTabs" class="flex gap-2 flex-wrap"></div>
            </div>
            <div class="flex gap-3">
              <button id="btnAllColors" class="px-3 py-1.5 rounded border text-sm bg-purple-100 dark:bg-purple-900 text-purple-900 dark:text-purple-100 font-medium hover:bg-purple-200 dark:hover:bg-purple-800">All Colors</button>
              <button id="btnToggleEquivalents" class="px-3 py-1.5 rounded border text-sm bg-blue-100 dark:bg-blue-900 text-blue-900 dark:text-blue-100 font-medium hover:bg-blue-200 dark:hover:bg-blue-800" title="Toggle equivalents visibility">Hide Equivalents</button>
              <button id="btnToggleView" class="px-3 py-1.5 rounded border text-sm bg-green-100 dark:bg-green-900 text-green-900 dark:text-green-100 font-medium hover:bg-green-200 dark:hover:bg-green-900" title="Toggle between card and table view">Table View</button>
            </div>
          </div>
        </section>

        <section>
          <div id="list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2 shadow-sm"></div>

          <template id="colorRowTemplate">
            <div class="bg-white dark:bg-gray-800 p-0 rounded-xl shadow-sm flex justify-between text-xl overflow-hidden">
              <div data-swatch class="w-12 shadow-sm flex-shrink-0"></div>
              <div class="flex items-center gap-2 flex-1 p-2">
                <div class="flex-1 min-w-0">
                  <div data-code class="font-semibold text-xl truncate mb-0">CODE</div>
                  <div data-name class="font-semibold text-xs truncate mb-2">NAME</div>
                  <div data-type class="text-xs text-gray-500 dark:text-gray-400"></div>
                  <div data-equivalents class="hidden text-xs text-gray-500 dark:text-gray-400"></div>
                  <div data-secondary-equivalents class="hidden text-xs text-gray-500 dark:text-gray-400"></div>
                </div>
                <button data-btn class="px-2 py-0.5 rounded border text-xs whitespace-nowrap">Stack</button>
              </div>
            </div>
          </template>
        </section>
      </div>

      <!-- ── My Stack sidebar ── -->
      <aside class="w-56 flex-shrink-0 sticky top-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-3">
          <div class="flex justify-between items-center mb-3 pb-2 border-b border-gray-200 dark:border-gray-700">
            <h2 class="font-semibold text-sm">My Stack</h2>
            <span id="stackCount" class="text-xs bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 rounded-full px-2 py-0.5">0</span>
          </div>
          <div id="stackPanelList" class="space-y-1.5 overflow-y-auto" style="max-height:calc(100vh - 160px)">
            <p class="text-xs text-gray-400 dark:text-gray-500 text-center py-4">Stack is empty</p>
          </div>
          <div class="mt-3 pt-2 border-t border-gray-200 dark:border-gray-700 flex flex-col gap-1.5">
            <button id="btnSaveStack" class="w-full px-3 py-1.5 rounded border text-xs bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-gray-200 font-medium hover:bg-gray-100 dark:hover:bg-gray-600 text-left">Save to file</button>
            <label class="w-full px-3 py-1.5 rounded border text-xs bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-gray-200 font-medium hover:bg-gray-100 dark:hover:bg-gray-600 cursor-pointer">
              Load from file
              <input type="file" id="stackFileInput" accept=".txt" class="hidden" />
            </label>
          </div>
        </div>
      </aside>

    </div>

    <!-- All Colors Modal -->
    <div id="allColorsModal" class="hidden fixed inset-0 bg-black/50 z-40 flex items-center justify-center p-4">
      <div class="bg-white dark:bg-gray-800 rounded-xl shadow-xl max-w-6xl w-full max-h-[90vh] flex flex-col">
        <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
          <h2 class="text-xl font-semibold">All Colors (sorted by swatch)</h2>
          <button id="closeAllColors" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300 text-2xl leading-none">×</button>
        </div>
        <div id="allColorsList" class="flex-1 overflow-y-auto p-2 "></div>
      </div>
    </div>

    <script type="module" src="/script.js"></script>

    <!-- Hover tooltip for equivalent color references -->
    <div id="colorTooltip" class="hidden fixed z-50 pointer-events-none bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-200 dark:border-gray-700 overflow-hidden w-44">
      <div id="tooltipSwatch" class="h-12 w-full"></div>
      <div class="p-2">
        <div id="tooltipCode" class="font-semibold text-sm"></div>
        <div id="tooltipName" class="text-xs text-gray-500 dark:text-gray-400 leading-tight mt-0.5"></div>
        <div id="tooltipBrand" class="text-[10px] text-gray-400 dark:text-gray-500 mt-0.5"></div>
      </div>
    </div>

  </body>
</html>
