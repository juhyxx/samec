<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#F5F5F5" stroke="#A6192E" stroke-width="2"/>
  
  <!-- Shield shape representing official/standardized -->
  <path d="M 100 40 L 140 60 L 140 110 Q 100 150 100 150 Q 100 150 60 110 L 60 60 Z" 
        fill="#A6192E" opacity="0.9"/>
  
  <!-- Star in center (representing quality/standard) -->
  <g transform="translate(100, 95)">
    <!-- Five-pointed star -->
    <path d="M 0,-20 L 6,-8 L 20,-8 L 10,0 L 15,15 L 0,8 L -15,15 L -10,0 L -20,-8 L -6,-8 Z" 
          fill="#FFFFFF"/>
  </g>
  
  <!-- Text: FS -->
  <text x="100" y="135" font-family="Arial, sans-serif" font-size="18" font-weight="bold" 
        fill="#A6192E" text-anchor="middle" font-style="italic">FS</text>
  
  <!-- Decorative bottom line -->
  <line x1="75" y1="150" x2="125" y2="150" stroke="#A6192E" stroke-width="1.5" opacity="0.6"/>
</svg>